name: Deploy to GitHub Pages

on:
  push:
    branches:
      - dev # Сценарий запускается при пуше в ветку dev

permissions:
  contents: write # Разрешение на запись в ветку gh-pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Укажите нужную версию Node.js
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build 

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Папка со сборкой (для Vite/Vue это dist, для React часто build)
          branch: gh-pages # Ветка, куда будет отправлен готовый билд
