name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Сценарий запускается при пуше в ветку dev

permissions:
  contents: write # Разрешение на запись в ветку gh-pages

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Укажите нужную версию Node.js
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Изменили команду, чтобы Vite не падал из-за TypeScript ошибок (если они есть)
      - name: Build project
        run: npm run build -- --emptyOutDir

      # Проверяем, что папка dist реально создалась и там лежит правильный index.html
      - name: Verify build folder
        run: |
          ls -la dist
          cat dist/index.html | grep assets || echo "ВНИМАНИЕ: Сборка не удалась или index.html не изменился!"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Проверьте, что в вашем package.json команда build создает именно "dist"
          branch: gh-pages
          clean: true # Обязательно очищать ветку перед деплоем
